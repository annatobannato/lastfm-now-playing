name: Update Last.fm

on:
  schedule:
    - cron: "*/2 * * * *"

  workflow_dispatch:

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4


    - name: Update song
      run: |

        python - <<EOF

        import requests
        import json
        import os

        user="Patry_k"

        key=os.environ["LASTFM_API_KEY"]

        url=f"https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user={user}&api_key={key}&format=json"

        data=requests.get(url).json()

        track=data["recenttracks"]["track"][0]

        song={
          "artist":track["artist"]["#text"],
          "track":track["name"],
          "cover":track["image"][-1]["#text"]
        }

        open("nowplaying.json","w").write(json.dumps(song))

        EOF

      env:
        LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}



    - name: Save changes
      run: |

        git config user.name github-actions

        git config user.email actions@github.com

        git add .

        git commit -m "update song" || exit 0

        git pull origin main --rebase

        git push origin main
